<!doctype html>
<!-- index.html -->
<!-- ============================================================
   ROOT HTML — Claymorphism Portfolio
   Edit: <title>, <meta description>, og:tags, and favicon path.
   ============================================================ -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon — replace /favicon.svg with your own ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── SEO ── -->
    <!-- Edit name and description -->
    <title>Kritika Mandale — Creative Developer & Designer</title>
    <meta
      name="description"
      content="Portfolio of Kritika Mandale — a Creative Developer & Designer specializing in beautiful, production-grade web experiences. Available for freelance and full-time roles."
    />
    <meta name="author" content="Kritika Mandale" />
    <meta name="theme-color" content="#f5f0eb" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://critika.io/" />
    <!-- ── Edit og:title and og:description ── -->
    <meta property="og:title"       content="Kritika Mandale — Creative Developer & Designer" />
    <meta property="og:description" content="Building beautiful digital experiences with code and design." />
    <!-- ── Add your OG image path ── -->
    <meta property="og:image"       content="/og-image.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Kritika Mandale — Portfolio" />
    <meta name="twitter:description" content="Creative Developer & Designer." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ── Preconnect to Google Fonts (performance) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <!-- Skip link for accessibility -->
    <a href="#main-content" class="sr-only">Skip to main content</a>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Vite injects the bundled JS here -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
